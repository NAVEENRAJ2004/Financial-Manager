<section class="login">
    <div class="login_box">
        <div class="left">
            <form [formGroup]="loginForm" (ngSubmit)="userLogin()">
                <h2 class="text-center">Log In</h2>
                <hr>
                <div class="mb-3">
                    <label for="mail" class="form-label">Email</label>
                    <input type="email" ngModel class="form-control" name="mail" id="mail" placeholder="Enter email address" formControlName="mail">
                    <span class="error" *ngIf="mail && mail.invalid && mail.touched">Please enter a valid email</span>
                </div>
                <div class="mb-3" id="pswd">
                    <label for="password" class="form-label">Password</label>
                    <input [type]="active?'text':'password'" ngModel class="form-control" id="password" name="password" placeholder="Enter password" formControlName="password">
                    <span class="error" *ngIf="password && password.invalid && password.touched">Please enter a valid password</span>
                </div>
                <div class="text-left">
                    <li *ngIf="!active" class="toggle-password"><fa-icon class="eye" (click)="toggleShow()" [icon]="faEye"></fa-icon> Show Password</li>
                    <li *ngIf="active" class="toggle-password"><fa-icon class="eye" (click)="toggleShow()" [icon]="faGhost"></fa-icon> Hide Password</li>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn-primary">Log In</button>
                    <div class="account-info">
                        Don't have an Account? <br>
                        <a class="signup-link" routerLink="/signup">Create an Account</a>
                    </div>
                </div>
            </form>
        </div>
        <div class="right"></div>
    </div>
</section>
